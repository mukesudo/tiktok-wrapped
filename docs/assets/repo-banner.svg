    <text x="402" y="496" fill="white" fill-opacity="0.92" font-family="Inter, Arial, sans-serif" font-size="22">Local-first</text>

    <rect x="540" y="462" width="224" height="52" rx="26" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12"/>
    <circle cx="576" cy="488" r="7" fill="#1ED760"/>
    <text x="596" y="496" fill="white" fill-opacity="0.92" font-family="Inter, Arial, sans-serif" font-size="22">Share-ready visuals</text>
